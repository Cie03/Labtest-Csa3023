<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Smart Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 2.8em;
            letter-spacing: 3px;
            font-weight: 700;
        }
        .header h1 span {
            color: #3498db;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 8px;
            font-weight: 300;
        }
        .container {
            flex: 1;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 Drive Smart <span>Academy</span></h1>
        <p>Integrated Driving School Management Platform</p>
